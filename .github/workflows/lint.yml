name: Lint

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  yaml-lint:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install yamllint
        run: pip install yamllint

      - name: Run yamllint
        run: |
          yamllint -c .yamllint.yml \
            aws/ \
            gcp/ \
            cloudflare/

  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Helm Kustomize Lint
        uses: somaz94/helm-kustomize-lint-action@v1
        with:
          chart_path: ./helm
          values_files: |
            helm/values-aws.yaml
            helm/values-gcp.yaml
            helm/values-cloudflare.yaml
          lint_strict: 'false'
          run_yamllint: 'false'
